# ---------- Identification du projet ----------
sonar.projectKey=dpscheck-backend
sonar.projectName=DPSCHECK Backend
sonar.projectVersion=1.0.0

# ---------- Serveur SonarQube ----------
# Par défaut, la valeur est celle du conteneur local.
# En CI/CD, remplacer via variable d'env : SONAR_HOST_URL
sonar.host.url=http://localhost:9000
# Le token est passé par variable d'env SONAR_TOKEN lors de l'exécution
# (ne jamais commiter de token en clair dans ce fichier)

# ---------- Sources analysées ----------
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=\
    **/node_modules/**,\
    **/dist/**,\
    **/coverage/**,\
    **/*.spec.ts,\
    **/*.e2e-spec.ts,\
    **/main.ts,\
    **/app.module.ts

# ---------- Encodage et langage ----------
sonar.sourceEncoding=UTF-8
sonar.typescript.node=node

# ---------- Couverture de tests ----------
# lcov.info est généré par `npm run test:cov` (cf. jest config dans package.json)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=\
    **/*.spec.ts,\
    **/*.e2e-spec.ts,\
    **/dto/**,\
    **/entities/**,\
    **/common/enums.ts,\
    **/main.ts,\
    **/app.module.ts,\
    **/*.module.ts

# ---------- Duplication ----------
sonar.cpd.exclusions=\
    **/dto/**,\
    **/entities/**
