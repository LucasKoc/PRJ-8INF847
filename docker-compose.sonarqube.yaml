services:
  sonarqube:
    image: sonarqube:community
    container_name: dpscheck_sonarqube
    depends_on:
      - sonar_db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_pwd
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - sonarqube_net

  sonar_db:
    image: postgres:16-alpine
    container_name: dpscheck_sonar_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_pwd
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - sonarqube_net

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:

networks:
  sonarqube_net:
    driver: bridge
