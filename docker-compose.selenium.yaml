services:
  postgres-selenium:
    image: postgres:16-alpine
    container_name: dpscheck_postgres_selenium
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpscheck_selenium
      POSTGRES_PASSWORD: selenium_pwd
      POSTGRES_DB: dpscheck_selenium
    ports:
      - "5434:5432"
    volumes:
      - dpscheck_pgdata_selenium:/var/lib/postgresql/data
      # Schéma + données de seed (organizer_one, alice_mid, équipe Phoenix)
      - ./Backend/sql/dpscheck_schema_pgsql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./Backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dpscheck_selenium -d dpscheck_selenium" ]
      interval: 3s
      timeout: 3s
      retries: 15
    networks:
      - dpscheck_selenium_net

  api-selenium:
    build:
      context: ./Backend/
      dockerfile: Dockerfile
    container_name: dpscheck_api_selenium
    restart: unless-stopped
    depends_on:
      postgres-selenium:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: 3000
      API_PREFIX: api
      DB_HOST: postgres-selenium
      DB_PORT: 5432
      DB_USER: dpscheck_selenium
      DB_PASSWORD: selenium_pwd
      DB_NAME: dpscheck_selenium
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      JWT_SECRET: selenium_test_secret_key
      JWT_EXPIRES_IN: 3600s
      CORS_ORIGIN: http://localhost:4201
    expose:
      - "3000"
    ports:
      - "3001:3000"
    networks:
      dpscheck_selenium_net:
        aliases:
          - api

  frontend-selenium:
    build:
      context: ./Frontend/
      dockerfile: Dockerfile
    container_name: dpscheck_frontend_selenium
    restart: unless-stopped
    depends_on:
      - api-selenium
    ports:
      - "4201:80"
    networks:
      - dpscheck_selenium_net

volumes:
  dpscheck_pgdata_selenium:

networks:
  dpscheck_selenium_net:
    driver: bridge