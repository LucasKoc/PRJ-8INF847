server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Logs
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    gzip_min_length 256;

    # Security headers (léger, sans contraindre)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Reverse proxy /api → backend NestJS ---
    # Le conteneur API est atteignable par son nom de service `api`
    # sur le réseau Docker (cf. docker-compose.yaml).
    location /api/ {
        proxy_pass          http://api:3000/api/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Augmente les timeouts par défaut pour les appels longs
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # WebSocket support (au cas où on en ajoute plus tard)
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";

        # Ne jamais mettre en cache les réponses API
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # --- Assets hashés : cache agressif ---
    # Angular produit des fichiers avec hash (ex: main-ABC123.js)
    # donc on peut les cacher de façon immuable.
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # --- SPA fallback ---
    # Toutes les routes non-fichiers renvoient index.html
    # (pour que le routing côté Angular fonctionne).
    location / {
        try_files $uri $uri/ /index.html;
        # index.html ne doit pas être cachée pour permettre les mises à jour
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Page d'erreur minimale
    error_page 500 502 503 504 /index.html;
}
