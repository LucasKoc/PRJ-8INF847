---
- name: Déploiement DPSCHECK sur {{ target_env | upper }}
  hosts: dpscheck_servers
  become: false
  gather_facts: true

  vars:
    image_tag: "{{ image_tag | default('latest') }}"
    target_env: "{{ target_env | default('dev') }}"
    deploy_dir: "{{ ansible_env.HOME }}/dpscheck-{{ target_env }}"
    docker_namespace: "kocoglulucas"

  tasks:

    # ----------------------------------------------------------------------
    # 1. Vérifications préalables
    # ----------------------------------------------------------------------
    - name: "1 · Vérifier que Docker est installé"
      command: docker --version
      register: docker_check
      changed_when: false
      failed_when: docker_check.rc != 0

    - name: "1b · Afficher les informations du déploiement"
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Déploiement DPSCHECK"
          - "  Environnement   : {{ target_env | upper }}"
          - "  Tag des images  : {{ image_tag }}"
          - "  Dossier cible   : {{ deploy_dir }}"
          - "  Hôte            : {{ inventory_hostname }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ----------------------------------------------------------------------
    # 2. Préparation du dossier de déploiement
    # ----------------------------------------------------------------------
    - name: "2 · Créer le dossier de déploiement"
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: "2b · Générer le docker-compose.yaml de déploiement"
      template:
        src: templates/docker-compose.j2
        dest: "{{ deploy_dir }}/docker-compose.yaml"
        mode: '0644'

    # ----------------------------------------------------------------------
    # 3. Pull des images depuis Docker Hub
    # ----------------------------------------------------------------------
    - name: "3 · Récupérer les images Docker avec le tag {{ image_tag }}"
      command: "docker pull {{ docker_namespace }}/dpscheck-{{ item }}:{{ image_tag }}"
      loop:
        - backend
        - frontend
      # En mode DEV local, on n'a pas forcément les images publiées — on ignore
      ignore_errors: "{{ target_env == 'dev' }}"

    # ----------------------------------------------------------------------
    # 4. Arrêt de l'ancienne version + démarrage de la nouvelle
    # ----------------------------------------------------------------------
    - name: "4 · Arrêter l'ancienne version (si présente)"
      command: docker compose down
      args:
        chdir: "{{ deploy_dir }}"
      ignore_errors: true

    - name: "4b · Démarrer la nouvelle version"
      command: docker compose up -d
      args:
        chdir: "{{ deploy_dir }}"

    # ----------------------------------------------------------------------
    # 5. Vérification post-déploiement
    # ----------------------------------------------------------------------
    - name: "5 · Attendre que l'API réponde (smoke test)"
      uri:
        url: "http://localhost:{{ api_port | default(3000) }}/api/health"
        status_code: [200, 404]   # 404 accepté si pas d'endpoint /health
      register: api_health
      retries: 10
      delay: 3
      until: api_health.status is defined
      ignore_errors: true

    - name: "6 · Afficher le statut final"
      debug:
        msg: "Déploiement {{ target_env | upper }} terminé avec succès"
