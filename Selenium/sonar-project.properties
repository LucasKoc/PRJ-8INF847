sonar.projectKey=dpscheck-selenium
sonar.projectName=DPSCHECK Selenium Tests
sonar.projectVersion=1.0.0

sonar.host.url=http://localhost:9000

# ---------- Sources ----------
# Ce projet EST du code de test — pas de "sources" vs "tests" à distinguer.
# On analyse tout le src/ comme sources pour détecter les smells dans les
# Page Objects et les helpers.
sonar.sources=src
sonar.exclusions=\
    **/node_modules/**,\
    **/dist/**

sonar.sourceEncoding=UTF-8
sonar.typescript.node=node
